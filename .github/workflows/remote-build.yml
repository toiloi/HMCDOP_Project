name: Remote Build (AWS Free Tier Proxy)

on:
  repository_dispatch:
    types: [build-image]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy thông tin từ sự kiện Dispatch
        run: |
          echo "Target Repo: ${{ github.event.client_payload.repo_url }}"
          echo "Branch: ${{ github.event.client_payload.branch }}"
          echo "Image Tag: ${{ github.event.client_payload.image_tag }}"

      # Clone repository của người dùng
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo_owner }}/${{ github.event.client_payload.repo_name }}
          ref: ${{ github.event.client_payload.branch }}
          path: workspace

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./workspace
          push: true
          tags: ${{ github.event.client_payload.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
