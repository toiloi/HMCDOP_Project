# =============================================================
#  docker-compose.yml — MiniPaaS Production (VPS)
# =============================================================
# Cách chạy:
#   docker compose up -d --build
# =============================================================

services:

  backend:
    build: ./backend
    container_name: minipaas-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./kubeconfig.yaml/k3s.yaml:/root/.kube/config:ro
    environment:
      - KUBERNETES_MASTER=https://${VPS_PUBLIC_IP}:6443
      - KUBERNETES_TRUST_CERTIFICATES=true
    extra_hosts:
      - "kubernetes.default.svc:${VPS_PUBLIC_IP}"
    restart: always

  # ── React Frontend ───────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: minipaas-frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: always