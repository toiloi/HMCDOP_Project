spring:
  application:
    name: minipaas-control-plane

  # PostgreSQL: prefer SPRING_DATASOURCE_* (Neon/RDS). Fallback DB_* for local docker-compose.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:minipaas}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:minipaas}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:minipaas}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:minipaas-super-secret-key-change-this-in-production-2024}
    expiration-ms: 86400000

  kubernetes:
    kubeconfig: ${KUBECONFIG:/etc/rancher/k3s/k3s.yaml}
    mock: ${K8S_MOCK:true}

  registry:
    ghcr-user: ${GHCR_USER:your-github-username}
    ghcr-token: ${GHCR_TOKEN:your-github-pat-token}

  github:
    dispatch-repository: ${GITHUB_DISPATCH_REPO:}

  build:
    strategy: ${APP_BUILD_STRATEGY:kaniko}

  master-ip: ${MASTER_IP:127.0.0.1}

  deployment:
    domain: ${DEPLOYMENT_DOMAIN:}
    ingress-public-ip: ${DEPLOYMENT_K3S_IP:${MASTER_IP:127.0.0.1}}
    url-scheme: ${DEPLOYMENT_URL_SCHEME:http}

  cloudflare:
    enabled: ${CLOUDFLARE_DNS_ENABLED:false}
    api-token: ${CLOUDFLARE_API_TOKEN:}
    zone-id: ${CLOUDFLARE_ZONE_ID:}
    proxied: ${CLOUDFLARE_PROXIED:true}

logging:
  level:
    com.minipaas: DEBUG
    io.fabric8: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
